name: Docker Build and Push

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/postman/**'
      - '.github/workflows/docker-build-push.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/postman/**'
      - '.github/workflows/docker-build-push.yml'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  MONOLITH_IMAGE_NAME: ${{ github.repository }}/monolith
  MOVIES_SERVICE_IMAGE_NAME: ${{ github.repository }}/movies-service
  EVENTS_SERVICE_IMAGE_NAME: ${{ github.repository }}/events-service
  PROXY_SERVICE_IMAGE_NAME: ${{ github.repository }}/proxy-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create docker network
        run: docker network create cinemaabyss-network || true

      - name: Create .env file for proxy-service
        run: |
          cat > .env << EOF
          PORT=8000
          MONOLITH_URL=http://monolith:8080
          MOVIES_SERVICE_URL=http://movies-service:8081
          EVENTS_SERVICE_URL=http://events-service:8082
          GRADUAL_MIGRATION=true
          MOVIES_MIGRATION_PERCENT=50
          USE_MOVIES_SERVICE_FOR_GET=true
          USE_MOVIES_SERVICE_FOR_POST=false
          USE_MOVIES_SERVICE_FOR_PUT=false
          USE_MOVIES_SERVICE_FOR_DELETE=false
          REQUEST_TIMEOUT=10
          ENABLE_CACHING=true
          CACHE_TTL=300
          EOF

      - name: Start PostgreSQL
        run: |
          docker run -d --name postgres-test \
            --network cinemaabyss-network \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres_password \
            -e POSTGRES_DB=cinemaabyss \
            -p 5432:5432 \
            postgres:14
          
          # Ждем готовности PostgreSQL
          timeout 60 bash -c 'until docker exec postgres-test pg_isready; do sleep 2; done'

      - name: Start ZooKeeper and Kafka
        run: |
          # ZooKeeper
          docker run -d --name zookeeper-test \
            --network cinemaabyss-network \
            -p 2181:2181 \
            wurstmeister/zookeeper:latest
          
          # Kafka
          docker run -d --name kafka-test \
            --network cinemaabyss-network \
            -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-test:9092 \
            -e KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092 \
            -e KAFKA_ZOOKEEPER_CONNECT=zookeeper-test:2181 \
            -e KAFKA_CREATE_TOPICS="movie-events:1:1,user-events:1:1,payment-events:1:1" \
            -p 9092:9092 \
            wurstmeister/kafka:2.13-2.7.0
          
          sleep 10

      - name: Build and start Monolith
        run: |
          docker build -t monolith:test ./src/monolith
          docker run -d --name monolith-test \
            --network cinemaabyss-network \
            -e PORT=8080 \
            -e DB_CONNECTION_STRING="postgres://postgres:postgres_password@postgres-test:5432/cinemaabyss?sslmode=disable" \
            -p 8080:8080 \
            monolith:test

      - name: Build and start Movies Service
        run: |
          docker build -t movies-service:test ./src/microservices/movies
          docker run -d --name movies-service-test \
            --network cinemaabyss-network \
            -e PORT=8081 \
            -e DB_CONNECTION_STRING="postgres://postgres:postgres_password@postgres-test:5432/cinemaabyss?sslmode=disable" \
            -p 8081:8081 \
            movies-service:test

      - name: Build and start Events Service
        run: |
          docker build -t events-service:test -f ./src/microservices/Dockerfile-events ./src/microservices
          docker run -d --name events-service-test \
            --network cinemaabyss-network \
            -e PORT=8082 \
            -e KAFKA_BROKERS="kafka-test:9092" \
            -p 8082:8082 \
            events-service:test

      - name: Build and start Proxy Service
        run: |
          docker build -t proxy-service:test ./src/microservices -f ./src/microservices/Dockerfile-proxy
          docker run -d --name proxy-service-test \
            --network cinemaabyss-network \
            --env-file .env \
            -p 8000:8000 \
            proxy-service:test

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          sleep 15
          
          # Проверяем health endpoints
          timeout 60 bash -c 'until curl -s http://localhost:8080/health > /dev/null; do echo "Waiting for monolith..."; sleep 2; done'
          timeout 60 bash -c 'until curl -s http://localhost:8081/health > /dev/null; do echo "Waiting for movies service..."; sleep 2; done'
          timeout 60 bash -c 'until curl -s http://localhost:8082/health > /dev/null; do echo "Waiting for events service..."; sleep 2; done'
          timeout 60 bash -c 'until curl -s http://localhost:8000/health > /dev/null; do echo "Waiting for proxy service..."; sleep 2; done'
          
          echo "All services are ready!"

      - name: Run Postman tests in Docker
        run: |
          cd tests/postman
          
          # Собираем образ для тестов
          docker build -t cinemaabyss-api-tests .
          
          # Запускаем тесты с использованием docker.environment.json
          docker run --rm \
            --network=cinemaabyss-network \
            -v "$(pwd)/reports:/app/reports" \
            cinemaabyss-api-tests \
            --environment docker

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: tests/postman/reports/

      - name: Clean up test containers
        if: always()
        run: |
          docker stop monolith-test movies-service-test events-service-test proxy-service-test postgres-test zookeeper-test kafka-test || true
          docker rm monolith-test movies-service-test events-service-test proxy-service-test postgres-test zookeeper-test kafka-test || true
          docker network rm cinemaabyss-network || true

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: success() && github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Monolith
      - name: Extract metadata for Monolith
        id: meta-monolith
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.MONOLITH_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=ref,event=branch
            latest

      - name: Build and push Monolith
        uses: docker/build-push-action@v5
        with:
          context: ./src/monolith
          push: true
          tags: ${{ steps.meta-monolith.outputs.tags }}
          labels: ${{ steps.meta-monolith.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Movies Service
      - name: Extract metadata for Movies Service
        id: meta-movies
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.MOVIES_SERVICE_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=ref,event=branch
            latest

      - name: Build and push Movies Service
        uses: docker/build-push-action@v5
        with:
          context: ./src/microservices/movies
          push: true
          tags: ${{ steps.meta-movies.outputs.tags }}
          labels: ${{ steps.meta-movies.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Events Service
      - name: Extract metadata for Events Service
        id: meta-events
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.EVENTS_SERVICE_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=ref,event=branch
            latest

      - name: Build and push Events Service
        uses: docker/build-push-action@v5
        with:
          context: ./src/microservices/events
          file: ./src/microservices/Dockerfile-events
          push: true
          tags: ${{ steps.meta-events.outputs.tags }}
          labels: ${{ steps.meta-events.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Proxy Service
      - name: Extract metadata for Proxy Service
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROXY_SERVICE_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=ref,event=branch
            latest

      - name: Build and push Proxy Service
        uses: docker/build-push-action@v5
        with:
          context: ./src/microservices/proxy
          file: ./src/microservices/Dockerfile-proxy
          push: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: success() && github.event_name != 'pull_request'
    steps:
      - name: Send notification
        run: |
          echo "✅ All services built and pushed successfully!"
          echo "📦 Images published to GitHub Container Registry:"
          echo "  - Monolith: ${{ env.MONOLITH_IMAGE_NAME }}"
          echo "  - Movies Service: ${{ env.MOVIES_SERVICE_IMAGE_NAME }}"
          echo "  - Events Service: ${{ env.EVENTS_SERVICE_IMAGE_NAME }}"
          echo "  - Proxy Service: ${{ env.PROXY_SERVICE_IMAGE_NAME }}"